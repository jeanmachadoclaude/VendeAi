# Configuração das Edge Functions — fonte da verdade do verify_jwt.
# O deploy (local ou CI) lê este arquivo; sem entrada aqui o padrão é true.
# ATENÇÃO: call-webhook e backup-export são chamadas sem JWT de usuário
# (Twilio/cron) — mudar para true quebra essas integrações.

project_id = "hniieydykjvjwggshvkf"

[functions.analisar-interacao]
verify_jwt = true

[functions.automations-run]
# Chamada pelo pg_cron SEM JWT (auth própria: header x-worker-key)
verify_jwt = false

[functions.backup-export]
verify_jwt = false

[functions.calendar-sync]
verify_jwt = true

[functions.call-dial]
verify_jwt = true

[functions.call-webhook]
verify_jwt = false

[functions.email-send]
verify_jwt = true

[functions.email-sync]
verify_jwt = true

[functions.google-oauth]
# Callback GET do Google chega SEM JWT (auth própria: state nonce)
verify_jwt = false

[functions.member-admin]
verify_jwt = true

[functions.vendeai-analyze]
verify_jwt = true

[functions.wpp-connect]
verify_jwt = true

[functions.wpp-health]
# Chamada pelo pg_cron SEM JWT (auth própria: header x-worker-key)
verify_jwt = false

[functions.wpp-import]
verify_jwt = true

[functions.wpp-message]
verify_jwt = true

[functions.wpp-send]
verify_jwt = true

[functions.wpp-status]
verify_jwt = true

[functions.wpp-suggest]
verify_jwt = true

[functions.wpp-webhook]
# A Evolution chama SEM JWT (auth própria: ?token= webhook_token da org).
# ⚠️ verify_jwt=true aqui QUEBRA o recebimento de mensagens (401 no gateway
# antes do código rodar) — foi exatamente o bug de 12-14/jul/2026.
verify_jwt = false

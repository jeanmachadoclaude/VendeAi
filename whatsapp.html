<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VendeAI · WhatsApp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#080c14;--card:rgba(10,18,36,0.9);--sidebar:rgba(6,10,20,0.97);
      --border:rgba(74,127,212,0.2);--border2:rgba(74,127,212,0.08);
      --blue:#1e3a6e;--blue-l:#4a7fd4;--blue-ll:#7ab3f0;
      --gradient:linear-gradient(135deg,#1e3a6e 0%,#4a7fd4 55%,#1e3a6e 100%);
      --cream:#EDE8DB;--muted:#5e718a;--light:#a0b8d4;
      --success:#2ecc71;--warning:#f39c12;--danger:#e74c3c;--sidebar-w:240px;
      --wpp-green:#25D366;
    }
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--cream);height:100vh;display:flex;overflow:hidden;}
    ::selection{background:var(--blue-l);color:#fff;}
    #rocket-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
    #rocket-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.10;filter:saturate(0.4) brightness(0.45) hue-rotate(195deg);}
    #rocket-overlay{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 60% 40%,rgba(8,12,20,0.85) 0%,rgba(8,12,20,0.55) 60%,rgba(8,12,20,0.22) 100%),linear-gradient(to bottom,rgba(8,12,20,0.65) 0%,rgba(8,12,20,0.30) 50%,rgba(8,12,20,0.70) 100%);}
    .sidebar{width:var(--sidebar-w);height:100vh;background:var(--sidebar);border-right:1px solid var(--border2);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;}
    .sidebar-brand{padding:28px 24px 20px;border-bottom:1px solid var(--border2);}
    .sidebar-logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;letter-spacing:-.5px;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none;display:block;}
    .sidebar-by{font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:3px;}
    .sidebar-nav{flex:1;padding:16px 12px;overflow-y:auto;}
    .nav-section-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(94,113,138,0.5);padding:12px 12px 6px;}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;font-size:13.5px;font-weight:500;color:var(--muted);text-decoration:none;transition:background .2s,color .2s;margin-bottom:2px;position:relative;}
    .nav-item:hover{background:rgba(74,127,212,0.08);color:var(--light);}
    .nav-item.active{background:rgba(74,127,212,0.14);color:var(--blue-ll);}
    .nav-item.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;border-radius:0 3px 3px 0;background:var(--blue-l);}
    .nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0;}
    .nav-badge{margin-left:auto;background:var(--blue-l);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;}
    .sidebar-bottom{padding:16px 12px 20px;border-top:1px solid var(--border2);}
    .user-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:rgba(74,127,212,0.06);border:1px solid var(--border2);}
    .user-avatar{width:32px;height:32px;border-radius:8px;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0;}
    .user-info{flex:1;min-width:0;}
    .user-name{font-size:12px;font-weight:600;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .user-role{font-size:10px;color:var(--muted);}
    .btn-logout-sm{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:4px;}
    .btn-logout-sm:hover{color:var(--danger);}

    /* WPP LAYOUT */
    .main{flex:1;margin-left:var(--sidebar-w);display:flex;height:100vh;position:relative;z-index:2;}

    /* CONVERSATIONS LIST */
    .conv-panel{width:320px;border-right:1px solid var(--border2);display:flex;flex-direction:column;background:rgba(8,12,20,0.6);}
    .conv-header{padding:16px 20px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;}
    .conv-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:800;color:var(--cream);}
    .wpp-status{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--wpp-green);}
    .wpp-dot{width:7px;height:7px;border-radius:50%;background:var(--wpp-green);animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.5)}}
    .conv-search{padding:10px 16px;border-bottom:1px solid var(--border2);}
    .conv-search input{width:100%;padding:8px 12px 8px 32px;background:rgba(74,127,212,0.07);border:1px solid var(--border2);border-radius:8px;font-size:13px;color:var(--cream);font-family:'Inter',sans-serif;outline:none;}
    .conv-search input::placeholder{color:var(--muted);}
    .conv-search{position:relative;}
    .conv-search::before{content:'🔍';position:absolute;left:28px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none;}
    .conv-list{flex:1;overflow-y:auto;}
    .conv-item{display:flex;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border2);cursor:pointer;transition:background .2s;}
    .conv-item:hover{background:rgba(74,127,212,0.06);}
    .conv-item.active{background:rgba(74,127,212,0.1);}
    .conv-avatar{width:42px;height:42px;border-radius:12px;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0;position:relative;}
    .conv-unread-badge{position:absolute;top:-4px;right:-4px;min-width:18px;height:18px;background:var(--wpp-green);border-radius:100px;font-size:10px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid var(--bg);}
    .conv-info{flex:1;min-width:0;}
    .conv-name{font-size:13px;font-weight:700;color:var(--cream);margin-bottom:2px;}
    .conv-preview{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .conv-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
    .conv-time{font-size:10px;color:var(--muted);}
    .conv-tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:100px;}
    .conv-tag.hot{background:rgba(231,76,60,0.15);color:#e74c3c;}
    .conv-tag.auto{background:rgba(74,127,212,0.15);color:var(--blue-ll);}

    /* CHAT PANEL */
    .chat-panel{flex:1;display:flex;flex-direction:column;}
    .chat-header{padding:14px 24px;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:14px;background:rgba(8,12,20,0.7);}
    .chat-avatar{width:40px;height:40px;border-radius:10px;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0;}
    .chat-name{font-size:15px;font-weight:700;color:var(--cream);}
    .chat-company{font-size:12px;color:var(--muted);}
    .chat-header-actions{margin-left:auto;display:flex;gap:8px;}
    .chat-action-btn{width:34px;height:34px;border-radius:9px;background:rgba(74,127,212,0.07);border:1px solid var(--border2);color:var(--muted);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
    .chat-action-btn:hover{background:rgba(74,127,212,0.15);color:var(--light);}
    .deal-chip{display:flex;align-items:center;gap:6px;padding:5px 12px;background:rgba(74,127,212,0.08);border:1px solid var(--border2);border-radius:8px;font-size:11px;font-weight:600;color:var(--light);cursor:pointer;transition:all .2s;}
    .deal-chip:hover{border-color:var(--border);color:var(--blue-ll);}

    /* MESSAGES */
    .chat-messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:12px;}
    .msg-date-divider{text-align:center;font-size:11px;color:var(--muted);margin:8px 0;position:relative;}
    .msg-date-divider::before{content:'';position:absolute;left:0;right:0;top:50%;height:1px;background:var(--border2);}
    .msg-date-divider span{background:var(--bg);position:relative;padding:0 12px;}
    .msg{display:flex;gap:8px;max-width:70%;}
    .msg.sent{align-self:flex-end;flex-direction:row-reverse;}
    .msg.recv{align-self:flex-start;}
    .msg-bubble{padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.55;position:relative;}
    .msg.recv .msg-bubble{background:rgba(74,127,212,0.12);border:1px solid rgba(74,127,212,0.18);color:var(--cream);border-radius:4px 16px 16px 16px;}
    .msg.sent .msg-bubble{background:var(--gradient);color:#fff;border-radius:16px 4px 16px 16px;}
    .msg.auto .msg-bubble{background:rgba(37,211,102,0.1);border:1px solid rgba(37,211,102,0.2);color:var(--cream);border-radius:4px 16px 16px 16px;}
    .msg-time{font-size:10px;color:var(--muted);margin-top:4px;text-align:right;}
    .msg.sent .msg-time{color:rgba(255,255,255,0.6);}
    .msg-avatar{width:28px;height:28px;border-radius:7px;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0;align-self:flex-end;}
    .auto-label{font-size:10px;color:var(--wpp-green);margin-bottom:2px;display:flex;align-items:center;gap:4px;}

    /* INPUT */
    .chat-input-area{padding:16px 24px;border-top:1px solid var(--border2);background:rgba(8,12,20,0.7);}
    .templates-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
    .template-pill{font-size:11px;font-weight:600;padding:4px 10px;border-radius:100px;border:1px solid var(--border2);color:var(--muted);cursor:pointer;background:none;font-family:'Inter',sans-serif;transition:all .2s;white-space:nowrap;}
    .template-pill:hover{border-color:var(--border);color:var(--light);background:rgba(74,127,212,0.07);}
    .input-row{display:flex;gap:10px;align-items:flex-end;}
    .msg-input{flex:1;padding:12px 16px;background:rgba(74,127,212,0.07);border:1px solid var(--border2);border-radius:12px;font-size:13px;color:var(--cream);font-family:'Inter',sans-serif;outline:none;resize:none;min-height:46px;max-height:120px;transition:border-color .2s;}
    .msg-input:focus{border-color:var(--blue-l);}
    .msg-input::placeholder{color:var(--muted);}
    .send-btn{width:46px;height:46px;border-radius:12px;background:var(--gradient);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .2s;flex-shrink:0;}
    .send-btn:hover{opacity:.88;}
    .attach-btn{width:46px;height:46px;border-radius:12px;background:rgba(74,127,212,0.07);border:1px solid var(--border2);color:var(--muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
    .attach-btn:hover{background:rgba(74,127,212,0.14);color:var(--light);}

    /* EMPTY STATE */
    .chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted);}
    .chat-empty-icon{font-size:48px;opacity:.3;}
  </style>
</head>
<body>
  <div id="rocket-bg">
    <video id="rocket-video" src="rocket.mp4" autoplay muted loop playsinline></video>
    <div id="rocket-overlay"></div>
  </div>

  <aside class="sidebar">
    <div class="sidebar-brand">
      <a class="sidebar-logo" href="dashboard.html">VendeAI</a>
      <div class="sidebar-by">by Outpace Growth</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Principal</div>
      <a class="nav-item" href="dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
      <a class="nav-item" href="pipeline.html"><span class="nav-icon">🔄</span> Pipelines<span class="nav-badge">3</span></a>
      <a class="nav-item" href="contacts.html"><span class="nav-icon">👥</span> Contatos</a>
      <a class="nav-item" href="deals.html"><span class="nav-icon">💼</span> Negócios</a>
      <div class="nav-section-label">Produtividade</div>
      <a class="nav-item" href="automations.html"><span class="nav-icon">⚡</span> Automações</a>
      <a class="nav-item" href="calendar.html"><span class="nav-icon">📅</span> Calendário</a>
      <a class="nav-item active" href="whatsapp.html"><span class="nav-icon">💬</span> WhatsApp<span class="nav-badge" id="unread-total">7</span></a>
      <div class="nav-section-label">Sistema</div>
      <a class="nav-item" href="settings.html"><span class="nav-icon">⚙️</span> Configurações</a>
    </nav>
    <div class="sidebar-bottom">
      <div class="user-card">
        <div class="user-avatar" id="user-avatar">JP</div>
        <div class="user-info">
          <div class="user-name" id="user-name">Jean Machado</div>
          <div class="user-role">Admin</div>
        </div>
        <button class="btn-logout-sm" id="btn-logout">↪</button>
      </div>
    </div>
  </aside>

  <div class="main">
    <!-- Conversations -->
    <div class="conv-panel">
      <div class="conv-header">
        <div class="conv-title">WhatsApp</div>
        <div class="wpp-status"><div class="wpp-dot"></div>Conectado</div>
      </div>
      <div class="conv-search">
        <input type="text" placeholder="  Buscar conversa..." oninput="filterConvs(this.value)" />
      </div>
      <div class="conv-list" id="conv-list">
        <div style="padding:32px 16px;text-align:center;color:var(--muted);font-size:13px;">Carregando...</div>
      </div>
    </div>

    <!-- Chat -->
    <div class="chat-panel">
      <div id="no-conv-state" class="chat-empty">
        <div class="chat-empty-icon">💬</div>
        <div>Selecione uma conversa para começar</div>
      </div>

      <div id="conv-content" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
        <div class="chat-header" id="chat-header-bar">
          <div class="chat-avatar" id="chat-avatar"></div>
          <div>
            <div class="chat-name" id="chat-name"></div>
            <div class="chat-company" id="chat-company"></div>
          </div>
          <div class="chat-header-actions">
            <div class="deal-chip" id="deal-chip" style="display:none">💼</div>
            <button class="chat-action-btn" title="Info do contato" onclick="openContactInfo()">👤</button>
            <button class="chat-action-btn" title="Agendar mensagem">⏰</button>
          </div>
        </div>

        <div class="chat-messages" id="chat-messages"></div>

        <div class="chat-input-area" id="chat-input-area">
          <div class="templates-row">
            <span style="font-size:11px;color:var(--muted);align-self:center;margin-right:2px;">Templates:</span>
            <button class="template-pill" onclick="useTemplate('followup')">Follow-up</button>
            <button class="template-pill" onclick="useTemplate('proposta')">Proposta enviada</button>
            <button class="template-pill" onclick="useTemplate('reuniao')">Confirmação reunião</button>
            <button class="template-pill" onclick="useTemplate('ganho')">Negócio fechado 🎉</button>
          </div>
          <div class="input-row">
            <button class="attach-btn" title="Anexar">📎</button>
            <textarea class="msg-input" id="msg-input" placeholder="Escreva uma mensagem..." rows="1" onkeydown="handleKey(event)"></textarea>
            <button class="send-btn" onclick="sendMessage()">➤</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ── STATE ────────────────────────────────────────────────────
    let authCtx = null;
    let allConversations = [], allMessages = [], currentConvId = null;
    let realtimeSub = null, _lastSentId = null;

    const templates = {
      followup: 'Olá {{nome}}, tudo bem? Gostaria de verificar se ficou alguma dúvida sobre nossa conversa anterior. Estou à disposição! 😊',
      proposta:  'Olá {{nome}}! Acabei de enviar a proposta para o seu e-mail. Por favor, confirme o recebimento. Qualquer dúvida, estou aqui! 🚀',
      reuniao:   'Confirmando nossa reunião para amanhã às {{hora}}. Aqui está o link do Google Meet: {{link}}. Até lá! 📅',
      ganho:     'Que notícia incrível! 🎉 Bem-vindo à família {{empresa}}! Em breve nossa equipe entrará em contato para o onboarding. Obrigado pela confiança!'
    };

    // ── BOOT ─────────────────────────────────────────────────────
    async function initPage() {
      authCtx = await initAuth();
      if (!authCtx) return;
      await loadConversations();
      if (allConversations.length > 0) openConversation(allConversations[0].id);
    }

    // ── CONVERSATIONS ─────────────────────────────────────────────
    async function loadConversations() {
      const { data } = await sb
        .from('wpp_conversations')
        .select('id, phone, last_message, last_message_at, unread_count, status, contact_id, contacts(id, first_name, last_name, company, tag_color)')
        .eq('org_id', authCtx.profile.org_id)
        .eq('status', 'open')
        .order('last_message_at', { ascending: false });

      allConversations = data || [];
      renderConvList();
      updateUnreadTotal();
    }

    function renderConvList(filter = '') {
      const list = document.getElementById('conv-list');
      const filtered = filter
        ? allConversations.filter(c => {
            const n = contactName(c).toLowerCase();
            return n.includes(filter.toLowerCase()) || (c.last_message || '').toLowerCase().includes(filter.toLowerCase());
          })
        : allConversations;

      if (!filtered.length) {
        list.innerHTML = '<div style="padding:32px 16px;text-align:center;color:var(--muted);font-size:13px;">Nenhuma conversa</div>';
        return;
      }

      list.innerHTML = filtered.map(c => {
        const name     = contactName(c);
        const initials = nameInitials(name);
        const unread   = c.unread_count || 0;
        const tag      = c.contacts?.tag_color || 'warm';
        const isActive = c.id === currentConvId;
        return `
          <div class="conv-item${isActive ? ' active' : ''}" data-conv-id="${c.id}" onclick="openConversation('${c.id}')">
            <div class="conv-avatar">
              ${initials}
              ${unread > 0 ? `<div class="conv-unread-badge">${unread}</div>` : ''}
            </div>
            <div class="conv-info">
              <div class="conv-name">${escHtml(name)}</div>
              <div class="conv-preview">${escHtml(c.last_message || '')}</div>
            </div>
            <div class="conv-meta">
              <div class="conv-time">${fmtTime(c.last_message_at)}</div>
              ${tag === 'hot' ? '<span class="conv-tag hot">Hot</span>' : ''}
            </div>
          </div>`;
      }).join('');
    }

    // ── OPEN CONVERSATION ─────────────────────────────────────────
    async function openConversation(convId) {
      currentConvId = convId;
      const conv = allConversations.find(c => c.id === convId);
      if (!conv) return;

      // Show chat panel
      document.getElementById('no-conv-state').style.display = 'none';
      const cc = document.getElementById('conv-content');
      cc.style.display = 'flex';

      // Update active in list
      document.querySelectorAll('.conv-item').forEach(el =>
        el.classList.toggle('active', el.dataset.convId === convId));

      // Populate header
      const name = contactName(conv);
      document.getElementById('chat-avatar').textContent  = nameInitials(name);
      document.getElementById('chat-name').textContent    = name;
      document.getElementById('chat-company').textContent = conv.contacts?.company || conv.phone;

      // Mark as read
      if (conv.unread_count > 0) {
        conv.unread_count = 0;
        await sb.from('wpp_conversations').update({ unread_count: 0 }).eq('id', convId);
        const badge = document.querySelector(`[data-conv-id="${convId}"] .conv-unread-badge`);
        if (badge) badge.remove();
        updateUnreadTotal();
      }

      // Linked deal
      loadLinkedDeal(conv.contact_id);

      // Messages
      await loadMessages(convId);

      // Real-time: only inbound messages to avoid duplicating sent ones
      if (realtimeSub) { sb.removeChannel(realtimeSub); realtimeSub = null; }
      realtimeSub = sb.channel(`wpp_msgs_${convId}`)
        .on('postgres_changes', {
          event: 'INSERT', schema: 'public', table: 'wpp_messages',
          filter: `conversation_id=eq.${convId}`
        }, payload => {
          if (payload.new.id === _lastSentId) { _lastSentId = null; return; }
          allMessages.push(payload.new);
          appendMessageEl(payload.new);
          // Update conv preview
          const c = allConversations.find(x => x.id === convId);
          if (c) { c.last_message = payload.new.body; c.last_message_at = payload.new.created_at; }
          renderConvList();
        })
        .subscribe();
    }

    // ── MESSAGES ─────────────────────────────────────────────────
    async function loadMessages(convId) {
      const { data } = await sb
        .from('wpp_messages')
        .select('id, direction, body, is_auto, status, created_at')
        .eq('conversation_id', convId)
        .order('created_at', { ascending: true });

      allMessages = data || [];
      renderMessages();
    }

    function renderMessages() {
      const container = document.getElementById('chat-messages');
      if (!allMessages.length) {
        container.innerHTML = '<div style="text-align:center;color:var(--muted);padding:48px 24px;font-size:13px;">Nenhuma mensagem ainda</div>';
        return;
      }
      let lastDate = null;
      container.innerHTML = allMessages.map(m => {
        const d      = new Date(m.created_at);
        const dStr   = d.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
        const divider = dStr !== lastDate
          ? `<div class="msg-date-divider"><span>${dStr}</span></div>`
          : '';
        lastDate = dStr;
        return divider + buildMsgHTML(m);
      }).join('');
      container.scrollTop = container.scrollHeight;
    }

    function buildMsgHTML(m) {
      const d    = new Date(m.created_at);
      const time = `${d.getHours()}:${String(d.getMinutes()).padStart(2, '0')}`;
      const body = escHtml(m.body || '');

      if (m.is_auto) {
        return `<div class="msg auto">
          <div class="msg-avatar" style="background:rgba(37,211,102,0.3);color:#25D366;border:1px solid rgba(37,211,102,0.3)">⚡</div>
          <div>
            <div class="auto-label">⚡ Automação VendeAI</div>
            <div class="msg-bubble">${body}</div>
            <div class="msg-time">${time}</div>
          </div>
        </div>`;
      }

      if (m.direction === 'outbound') {
        const tick = m.status === 'read' ? '✓✓' : m.status === 'delivered' ? '✓✓' : '✓';
        return `<div class="msg sent">
          <div>
            <div class="msg-bubble">${body}</div>
            <div class="msg-time">${time} ${tick}</div>
          </div>
        </div>`;
      }

      const initials = document.getElementById('chat-avatar')?.textContent || '?';
      return `<div class="msg recv">
        <div class="msg-avatar">${initials}</div>
        <div>
          <div class="msg-bubble">${body}</div>
          <div class="msg-time">${time}</div>
        </div>
      </div>`;
    }

    function appendMessageEl(m) {
      const container = document.getElementById('chat-messages');
      const wrap      = document.createElement('div');
      wrap.innerHTML  = buildMsgHTML(m);
      container.appendChild(wrap.firstElementChild);
      container.scrollTop = container.scrollHeight;
    }

    // ── SEND MESSAGE ──────────────────────────────────────────────
    async function sendMessage() {
      const input = document.getElementById('msg-input');
      const text  = input.value.trim();
      if (!text || !currentConvId) return;
      input.value = '';

      const token = authCtx.session.access_token;
      let msg;
      try {
        const res = await fetch(`${sb.supabaseUrl}/functions/v1/wpp-send`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
          body:    JSON.stringify({ conversation_id: currentConvId, message: text }),
        });
        if (!res.ok) { console.error('wpp-send error:', res.status, await res.text()); return; }
        msg = await res.json();
      } catch (e) { console.error('wpp-send fetch error:', e); return; }

      // Skip the real-time echo for this message
      _lastSentId = msg.id;

      const conv = allConversations.find(c => c.id === currentConvId);
      if (conv) { conv.last_message = text; conv.last_message_at = new Date().toISOString(); }

      allMessages.push(msg);
      appendMessageEl(msg);

      allConversations.sort((a, b) => new Date(b.last_message_at) - new Date(a.last_message_at));
      renderConvList();
    }

    // ── LINKED DEAL ───────────────────────────────────────────────
    async function loadLinkedDeal(contactId) {
      const chip = document.getElementById('deal-chip');
      if (!contactId) { chip.style.display = 'none'; return; }

      const { data } = await sb.from('deals')
        .select('id, title, value')
        .eq('contact_id', contactId)
        .eq('status', 'open')
        .order('value', { ascending: false })
        .limit(1)
        .maybeSingle();

      if (data) {
        chip.style.display  = 'flex';
        chip.textContent    = `💼 ${data.title} — R$${(data.value / 1000).toFixed(0)}k`;
        chip.onclick        = () => window.location.href = 'deals.html';
      } else {
        chip.style.display  = 'none';
      }
    }

    // ── CONTACT INFO ──────────────────────────────────────────────
    function openContactInfo() {
      const conv = allConversations.find(c => c.id === currentConvId);
      if (conv?.contact_id) window.location.href = `contacts.html`;
    }

    // ── UNREAD TOTAL ──────────────────────────────────────────────
    function updateUnreadTotal() {
      const total = allConversations.reduce((s, c) => s + (c.unread_count || 0), 0);
      const badge = document.getElementById('unread-total');
      if (badge) badge.textContent = total > 0 ? total : '';
    }

    // ── TEMPLATES ─────────────────────────────────────────────────
    function useTemplate(key) {
      const conv    = allConversations.find(c => c.id === currentConvId);
      const contact = conv?.contacts;
      const tpl     = templates[key]
        .replace(/\{\{nome\}\}/g,    contact?.first_name || 'cliente')
        .replace(/\{\{empresa\}\}/g, contact?.company    || 'sua empresa')
        .replace(/\{\{hora\}\}/g,    '10:00')
        .replace(/\{\{link\}\}/g,    'meet.google.com/xxx-yyyy-zzz');
      const input = document.getElementById('msg-input');
      input.value = tpl;
      input.focus();
    }

    // ── FILTER ────────────────────────────────────────────────────
    function filterConvs(q) { renderConvList(q); }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }

    // ── HELPERS ───────────────────────────────────────────────────
    function contactName(conv) {
      const c = conv.contacts;
      return c ? `${c.first_name} ${c.last_name || ''}`.trim() : conv.phone;
    }

    function nameInitials(name) {
      return name.split(' ').slice(0, 2).map(n => n[0]).join('').toUpperCase();
    }

    function fmtTime(iso) {
      if (!iso) return '';
      const d    = new Date(iso);
      const now  = new Date();
      const diff = Math.floor((now - d) / 86400000);
      if (diff === 0) return `${d.getHours()}:${String(d.getMinutes()).padStart(2, '0')}`;
      if (diff === 1) return 'Ontem';
      return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── CROSS-TAB REFRESH ─────────────────────────────────────────
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && authCtx) loadConversations();
    });

    initPage();
  </script>
</body>
</html>

# Deploya as Edge Functions no Supabase a cada push na main que toque nelas.
# Requer o secret SUPABASE_ACCESS_TOKEN (Settings → Secrets and variables →
# Actions). O verify_jwt de cada função vem de supabase/config.toml.
name: Deploy Supabase Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy todas as functions
        run: supabase functions deploy --project-ref hniieydykjvjwggshvkf --use-api
